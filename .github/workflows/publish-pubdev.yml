name: Publish to pub.dev

on:
  push:
    # Trigger constraint: release workflow only reacts to version-like tags.
    # Strict `vX.Y.Z` validation is enforced in `tag_version_check`.
    tags:
      - "v*.*.*"

jobs:
  quality_gates:
    # Gate ordering: run shared quality gates before any publish-specific gates.
    uses: ./.github/workflows/quality-gates.yml

  tag_version_check:
    name: tag_version_check
    runs-on: ubuntu-latest
    needs: quality_gates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag format and pubspec version match
        # Failure condition: non-`vX.Y.Z` tags or mismatched versions stop release before publish.
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG' must match vX.Y.Z (no prerelease/build suffixes)." >&2
            exit 1
          fi

          TAG_VERSION="${TAG#v}"
          PUBSPEC_VERSION="$(sed -nE 's/^version:[[:space:]]*([^+[:space:]]+).*$/\1/p' pubspec.yaml | head -n1)"

          if [[ -z "$PUBSPEC_VERSION" ]]; then
            echo "Could not determine version from pubspec.yaml." >&2
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]]; then
            echo "Tag version '$TAG_VERSION' does not match pubspec version '$PUBSPEC_VERSION'." >&2
            exit 1
          fi

  dry_run_publish:
    name: dry_run_publish
    runs-on: ubuntu-latest
    needs: tag_version_check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verify publish readiness with dry-run
        # Failure condition: any pub.dev packaging or validation issue blocks real publish.
        run: dart pub publish --dry-run

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: dry_run_publish
    # Environment protection: maintainers must configure `pubdev-release` with one required reviewer.
    environment: pubdev-release
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure pub.dev token from secret
        # Secret handling: token is injected from `PUB_DEV_PUBLISH_TOKEN` and never committed.
        # Maintainer prerequisite: configure `pubdev-release` environment and `PUB_DEV_PUBLISH_TOKEN` secret.
        env:
          PUB_DEV_PUBLISH_TOKEN: ${{ secrets.PUB_DEV_PUBLISH_TOKEN }}
        run: dart pub token add https://pub.dev --env-var PUB_DEV_PUBLISH_TOKEN

      - name: Publish package to pub.dev
        # Gate ordering: this runs only after quality gates, tag validation, and dry-run succeed.
        # Failure condition: publish API errors fail the workflow and keep deployment traceable in Actions.
        run: dart pub publish --force
